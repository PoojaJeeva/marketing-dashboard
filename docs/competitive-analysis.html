<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Competitive Analysis · Marketing Intelligence</title>
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <nav>
    <span class="nav-brand">⚡ Marketing Intelligence</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="competitive-analysis.html" class="active">Competitive Analysis</a>
      <a href="campaign-launch-planner.html">Campaign Planner</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>🔍 Competitive Analysis</h1>
      <p>Enter a competitor name and product. The agent will research pricing, positioning, messaging, GTM, SWOT, battle card, and campaign opportunities.</p>
    </div>

    <div class="input-form">
      <div class="form-row">
        <div class="form-group">
          <label>Competitor Company</label>
          <input id="competitor" type="text" placeholder="e.g. IPG Photonics" />
        </div>
        <div class="form-group">
          <label>Product Name</label>
          <input id="product" type="text" placeholder="e.g. YLS-2000" />
        </div>
        <button class="btn btn-primary" id="run-btn" onclick="runAnalysis()">Run Analysis →</button>
      </div>
    </div>

    <div class="status-bar" id="status-bar">
      <div class="status-dot queued" id="status-dot"></div>
      <span id="status-text">Queued…</span>
    </div>

    <div class="results-header" id="results-header">
      <div class="results-meta">
        <h2 id="results-title"></h2>
        <p id="results-sub"></p>
      </div>
      <div class="export-btns">
        <button class="btn btn-secondary" id="copy-btn" onclick="copyBattleCard(window._result)">Copy Battle Card</button>
        <button class="btn btn-secondary" onclick="window.print()">Download PDF</button>
        <button class="btn btn-secondary" onclick="downloadJson(window._result)">Download JSON</button>
      </div>
    </div>

    <div class="section-tabs" id="section-tabs"></div>
    <div class="results-grid" id="results-grid"></div>
  </div>

  <script src="js/render.js?v=4"></script>

  <script>
  // ── GitHub API ──────────────────────────────────────────────────────────────
  const OWNER = "PoojaJeeva";
  const REPO  = "marketing-dashboard";

  function getToken() { return sessionStorage.getItem("gh_pat") || ""; }

  async function ghFetch(path, opts = {}) {
    const token = getToken();
    const res = await fetch("https://api.github.com" + path, {
      ...opts,
      headers: {
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
        ...(token ? { "Authorization": "Bearer " + token } : {}),
        ...(opts.headers || {}),
      },
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error("GitHub API " + res.status + ": " + body);
    }
    const text = await res.text();
    if (!text || !text.trim()) return {};
    return JSON.parse(text);
  }

  async function triggerWorkflow(workflow, inputs) {
    await ghFetch("/repos/" + OWNER + "/" + REPO + "/actions/workflows/" + workflow + "/dispatches", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ref: "main", inputs: inputs }),
    });
  }

  async function getLatestRun(workflow) {
    const data = await ghFetch("/repos/" + OWNER + "/" + REPO + "/actions/workflows/" + workflow + "/runs?per_page=1");
    return (data.workflow_runs && data.workflow_runs[0]) || null;
  }

  async function getRunStatus(runId) {
    return ghFetch("/repos/" + OWNER + "/" + REPO + "/actions/runs/" + runId);
  }

  async function fetchResultJson(path) {
    const data = await ghFetch("/repos/" + OWNER + "/" + REPO + "/contents/" + path + "?ref=main");
    const text = atob(data.content.replace(/\n/g, ""));
    return JSON.parse(text);
  }

  function pollRun(runId, onStatus) {
    return new Promise(function(resolve, reject) {
      var iv = setInterval(async function() {
        try {
          var run = await getRunStatus(runId);
          onStatus(run.status, run.conclusion);
          if (run.status === "completed") {
            clearInterval(iv);
            if (run.conclusion === "success") resolve(run);
            else reject(new Error("Run failed: " + run.conclusion));
          }
        } catch(e) {
          clearInterval(iv);
          reject(e);
        }
      }, 8000);
    });
  }

  // ── App helpers ─────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", function() {
    if (!sessionStorage.getItem("gh_pat")) {
      var pat = prompt(
        "Enter your GitHub Personal Access Token (classic) with 'repo' scope.\n" +
        "It stays in this browser tab only.\n\n" +
        "Create at: github.com/settings/tokens"
      );
      if (pat) sessionStorage.setItem("gh_pat", pat.trim());
    }
  });

  function setStatus(msg, type) {
    var bar = document.getElementById("status-bar");
    var dot = document.getElementById("status-dot");
    var txt = document.getElementById("status-text");
    bar.classList.add("visible");
    dot.className = "status-dot " + type;
    txt.textContent = msg;
  }

  function showResults(heading, sub) {
    document.getElementById("results-header").classList.add("visible");
    document.getElementById("results-title").textContent = heading;
    document.getElementById("results-sub").textContent = sub;
    document.getElementById("section-tabs").classList.add("visible");
    document.getElementById("results-grid").classList.add("visible");
  }

  function populateTabs(count) {
    var tabs = document.getElementById("section-tabs");
    tabs.innerHTML = "";
    for (var i = 1; i <= count; i++) {
      (function(n) {
        var b = document.createElement("button");
        b.className = "tab-btn" + (n === 1 ? " active" : "");
        b.textContent = n;
        b.onclick = function() {
          document.querySelectorAll(".tab-btn").forEach(function(x){ x.classList.remove("active"); });
          b.classList.add("active");
          var card = document.querySelector('[data-section="' + n + '"]');
          if (card) card.scrollIntoView({ behavior: "smooth", block: "start" });
        };
        tabs.appendChild(b);
      })(i);
    }
  }

  function copyBattleCard(data) {
    if (!data) return;
    var bc = data.battle_card || {};
    var text = "BATTLE CARD — " + (data.competitor || "") + "\n" + "=".repeat(50) + "\n\n";
    text += "WE WIN WHEN:\n" + (bc.we_win_when || []).map(function(x){ return "• " + x; }).join("\n") + "\n\n";
    text += "THEY WIN WHEN:\n" + (bc.they_win_when || []).map(function(x){ return "• " + x; }).join("\n") + "\n\n";
    text += "OBJECTION HANDLING:\n";
    (bc.objection_handling || []).forEach(function(o){ text += "Q: " + o.objection + "\nA: " + o.response + "\n\n"; });
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById("copy-btn");
      btn.textContent = "Copied!";
      setTimeout(function(){ btn.textContent = "Copy Battle Card"; }, 2000);
    });
  }

  function downloadJson(data) {
    if (!data) return;
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (data.competitor || "result").replace(/\s+/g, "-").toLowerCase() + ".json";
    a.click();
  }

  // ── Page logic ───────────────────────────────────────────────────────────────
  async function runAnalysis() {
    var competitor = document.getElementById("competitor").value.trim();
    var product    = document.getElementById("product").value.trim();
    if (!competitor || !product) { alert("Please enter both fields."); return; }

    var btn = document.getElementById("run-btn");
    btn.disabled = true;
    btn.textContent = "Running…";
    setStatus("Triggering GitHub Actions workflow…", "queued");

    try {
      await triggerWorkflow("competitive-analysis.yml", {
        competitor_name: competitor,
        product_name: product,
      });

      setStatus("Workflow queued — waiting for agent to start…", "queued");
      await new Promise(function(r){ setTimeout(r, 6000); });

      var run = await getLatestRun("competitive-analysis.yml");
      if (!run) throw new Error("Could not find workflow run. Check the Actions tab on GitHub.");

      setStatus("Agent is running — researching " + competitor + "…", "running");

      await pollRun(run.id, function(status, conclusion) {
        if (status === "in_progress") setStatus("Agent is researching and synthesizing data…", "running");
        if (status === "completed" && conclusion === "success") setStatus("Analysis complete!", "complete");
      });

      var slug = (competitor + "-" + product).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      var data = await fetchResultJson("docs/data/competitive/" + slug + ".json");
      window._result = data;

      document.getElementById("results-grid").innerHTML = renderCompetitiveAnalysis(data);
      populateTabs(10);
      showResults(competitor + " — " + product, "Analyzed " + new Date(data.analyzed_at).toLocaleString());

    } catch(e) {
      setStatus("Error: " + e.message, "failed");
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = "Run Analysis →";
    }
  }
  </script>
</body>
</html>
