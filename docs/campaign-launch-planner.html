<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Campaign & Launch Planner · Marketing Intelligence</title>
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <nav>
    <span class="nav-brand">⚡ Marketing Intelligence</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="competitive-analysis.html">Competitive Analysis</a>
      <a href="campaign-launch-planner.html" class="active">Campaign Planner</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>🚀 Campaign & Launch Planner</h1>
      <p>Enter a product, goal, and target vertical. The agent builds a full campaign brief, channel plan, budget split, messaging, launch timeline, sales enablement pack, and KPIs.</p>
    </div>

    <div class="input-form">
      <div class="form-row">
        <div class="form-group" style="flex:1.5">
          <label>Product Name</label>
          <input id="product" type="text" placeholder="e.g. CleanTech 1000W Fiber Laser" />
        </div>
        <div class="form-group" style="flex:2">
          <label>Campaign Goal</label>
          <input id="goal" type="text" placeholder="e.g. Launch into aerospace market Q3" />
        </div>
        <div class="form-group">
          <label>Vertical</label>
          <select id="vertical">
            <option value="Commercial/Industrial">Commercial / Industrial</option>
            <option value="Defense/Government">Defense / Government</option>
          </select>
        </div>
        <button class="btn btn-primary" id="run-btn" onclick="runPlanner()">Generate Plan →</button>
      </div>
    </div>

    <div class="status-bar" id="status-bar">
      <div class="status-dot queued" id="status-dot"></div>
      <span id="status-text">Queued…</span>
    </div>

    <div class="results-header" id="results-header">
      <div class="results-meta">
        <h2 id="results-title"></h2>
        <p id="results-sub"></p>
      </div>
      <div class="export-btns">
        <button class="btn btn-secondary" id="copy-btn" onclick="copySalesPack(window._result)">Copy Sales Pack</button>
        <button class="btn btn-secondary" onclick="window.print()">Download PDF</button>
        <button class="btn btn-secondary" onclick="downloadJson(window._result)">Download JSON</button>
      </div>
    </div>

    <div class="section-tabs" id="section-tabs"></div>
    <div class="results-grid" id="results-grid"></div>
  </div>

  <script src="js/render.js?v=4"></script>

  <script>
  // ── GitHub API ──────────────────────────────────────────────────────────────
  const OWNER = "PoojaJeeva";
  const REPO  = "marketing-dashboard";

  function getToken() { return sessionStorage.getItem("gh_pat") || ""; }

  async function ghFetch(path, opts) {
    opts = opts || {};
    var token = getToken();
    var res = await fetch("https://api.github.com" + path, Object.assign({}, opts, {
      headers: Object.assign(
        {
          "Accept": "application/vnd.github+json",
          "X-GitHub-Api-Version": "2022-11-28",
        },
        token ? { "Authorization": "Bearer " + token } : {},
        opts.headers || {}
      ),
    }));
    if (!res.ok) {
      var body = await res.text();
      throw new Error("GitHub API " + res.status + ": " + body);
    }
    var text = await res.text();
    if (!text || !text.trim()) return {};
    return JSON.parse(text);
  }

  async function triggerWorkflow(workflow, inputs) {
    await ghFetch("/repos/" + OWNER + "/" + REPO + "/actions/workflows/" + workflow + "/dispatches", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ref: "main", inputs: inputs }),
    });
  }

  async function getLatestRun(workflow) {
    var data = await ghFetch("/repos/" + OWNER + "/" + REPO + "/actions/workflows/" + workflow + "/runs?per_page=1");
    return (data.workflow_runs && data.workflow_runs[0]) || null;
  }

  async function getRunStatus(runId) {
    return ghFetch("/repos/" + OWNER + "/" + REPO + "/actions/runs/" + runId);
  }

  async function fetchResultJson(path) {
    var data = await ghFetch("/repos/" + OWNER + "/" + REPO + "/contents/" + path + "?ref=main");
    var text = atob(data.content.replace(/\n/g, ""));
    return JSON.parse(text);
  }

  function pollRun(runId, onStatus) {
    return new Promise(function(resolve, reject) {
      var iv = setInterval(async function() {
        try {
          var run = await getRunStatus(runId);
          onStatus(run.status, run.conclusion);
          if (run.status === "completed") {
            clearInterval(iv);
            if (run.conclusion === "success") resolve(run);
            else reject(new Error("Run failed: " + run.conclusion));
          }
        } catch(e) {
          clearInterval(iv);
          reject(e);
        }
      }, 8000);
    });
  }

  // ── App helpers ─────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", function() {
    if (!sessionStorage.getItem("gh_pat")) {
      var pat = prompt(
        "Enter your GitHub Personal Access Token (classic) with 'repo' scope.\n" +
        "It stays in this browser tab only.\n\n" +
        "Create at: github.com/settings/tokens"
      );
      if (pat) sessionStorage.setItem("gh_pat", pat.trim());
    }
  });

  function setStatus(msg, type) {
    var bar = document.getElementById("status-bar");
    var dot = document.getElementById("status-dot");
    var txt = document.getElementById("status-text");
    bar.classList.add("visible");
    dot.className = "status-dot " + type;
    txt.textContent = msg;
  }

  function showResults(heading, sub) {
    document.getElementById("results-header").classList.add("visible");
    document.getElementById("results-title").textContent = heading;
    document.getElementById("results-sub").textContent = sub;
    document.getElementById("section-tabs").classList.add("visible");
    document.getElementById("results-grid").classList.add("visible");
  }

  function populateTabs(count) {
    var tabs = document.getElementById("section-tabs");
    tabs.innerHTML = "";
    for (var i = 1; i <= count; i++) {
      (function(n) {
        var b = document.createElement("button");
        b.className = "tab-btn" + (n === 1 ? " active" : "");
        b.textContent = n;
        b.onclick = function() {
          document.querySelectorAll(".tab-btn").forEach(function(x){ x.classList.remove("active"); });
          b.classList.add("active");
          var card = document.querySelector('[data-section="' + n + '"]');
          if (card) card.scrollIntoView({ behavior: "smooth", block: "start" });
        };
        tabs.appendChild(b);
      })(i);
    }
  }

  function copySalesPack(data) {
    if (!data) return;
    var se = data.sales_enablement || {};
    var text = "SALES ENABLEMENT PACK — " + (data.product || "") + "\n" + "=".repeat(50) + "\n\n";
    text += "TALK TRACK:\n" + (se.talk_track || []).map(function(x){ return "• " + x; }).join("\n") + "\n\n";
    text += "OBJECTION HANDLING:\n";
    (se.objection_handling || []).forEach(function(o){ text += "Q: " + o.objection + "\nA: " + o.response + "\n\n"; });
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById("copy-btn");
      btn.textContent = "Copied!";
      setTimeout(function(){ btn.textContent = "Copy Sales Pack"; }, 2000);
    });
  }

  function downloadJson(data) {
    if (!data) return;
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (data.product || "plan").replace(/\s+/g, "-").toLowerCase() + ".json";
    a.click();
  }

  // ── Page logic ───────────────────────────────────────────────────────────────
  async function runPlanner() {
    var product  = document.getElementById("product").value.trim();
    var goal     = document.getElementById("goal").value.trim();
    var vertical = document.getElementById("vertical").value;
    if (!product || !goal) { alert("Please enter both product name and campaign goal."); return; }

    var btn = document.getElementById("run-btn");
    btn.disabled = true;
    btn.textContent = "Running…";
    setStatus("Triggering GitHub Actions workflow…", "queued");

    try {
      await triggerWorkflow("campaign-launch-planner.yml", {
        product_name: product,
        campaign_goal: goal,
        vertical: vertical,
      });

      setStatus("Workflow queued — waiting for agent to start…", "queued");
      await new Promise(function(r){ setTimeout(r, 6000); });

      var run = await getLatestRun("campaign-launch-planner.yml");
      if (!run) throw new Error("Could not find workflow run. Check the Actions tab on GitHub.");

      setStatus("Agent is building your campaign plan…", "running");

      await pollRun(run.id, function(status, conclusion) {
        if (status === "in_progress") setStatus("Agent is researching market trends and building your plan…", "running");
        if (status === "completed" && conclusion === "success") setStatus("Plan complete!", "complete");
      });

      var slug = (product + "-" + vertical).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      var data = await fetchResultJson("docs/data/campaigns/" + slug + ".json");
      window._result = data;

      document.getElementById("results-grid").innerHTML = renderCampaignPlan(data);
      populateTabs(10);
      showResults(product + " — " + vertical, "Generated " + new Date(data.generated_at).toLocaleString());

    } catch(e) {
      setStatus("Error: " + e.message, "failed");
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = "Generate Plan →";
    }
  }
  </script>
</body>
</html>
