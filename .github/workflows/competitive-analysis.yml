name: Competitive Analysis Agent

on:
  workflow_dispatch:
    inputs:
      competitor_name:
        description: "Competitor company name"
        required: true
      product_name:
        description: "Competitor product name"
        required: true
  repository_dispatch:
    types: [run-competitive-analysis]

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run competitive analysis agent
        run: python scripts/run-competitive-analysis.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMPETITOR_NAME: ${{ github.event.inputs.competitor_name || github.event.client_payload.competitor_name }}
          PRODUCT_NAME: ${{ github.event.inputs.product_name || github.event.client_payload.product_name }}

      - name: Commit results
        run: |
          git config user.email "agent@github.com"
          git config user.name "Competitive Analysis Agent"
          git add docs/data/
          git diff --staged --quiet || git commit -m "analysis: ${{ github.event.inputs.competitor_name || github.event.client_payload.competitor_name }}"
          git push
